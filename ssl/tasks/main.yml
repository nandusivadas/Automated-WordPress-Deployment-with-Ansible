---
# tasks file for ssl
- name: Install Certbot
  dnf:
    name:
      - certbot
      - python3-certbot-nginx
    state: present

- name: Obtain SSL Certificate
  command: >
    certbot --nginx
    --non-interactive
    --agree-tos
    --email nandusivadas98@gmail.com
    -d mypersonalblog.duckdns.org

- name: Restart Nginx
  service:
    name: nginx
    state: restarted
