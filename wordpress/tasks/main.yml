---
# tasks file for wordpress

# Website User Management
- name: Create Website User
  user:
    name: admin
    shell: /bin/bash
    create_home: yes
    state: present

# Website Directory Setup
- name: Create Website Directory
  file:
    path: /home/admin/personalblog/public
    state: directory
    owner: admin
    group: admin
    mode: '0755'
    recurse: yes

# Database Configuration
- name: Create WordPress Database
  mysql_db:
    name: wordpress
    state: present
    login_unix_socket: /var/lib/mysql/mysql.sock

- name: Create WordPress Database User
  mysql_user:
    name: wpuser
    password: wordpress@123
    priv: "wordpress.*:ALL"
    state: present
    login_unix_socket: /var/lib/mysql/mysql.sock

# WordPress Installation
- name: Download WordPress
  get_url:
    url: https://wordpress.org/latest.tar.gz
    dest: /tmp/wordpress.tar.gz

- name: Extract WordPress
  unarchive:
    src: /tmp/wordpress.tar.gz
    dest: /tmp/
    remote_src: yes

- name: Copy WordPress Files
  copy:
    src: /tmp/wordpress/
    dest: /home/admin/personalblog/public/
    remote_src: yes

# WordPress Configuration
- name: Configure wp-config.php
  template:
    src: wp-config.php.j2
    dest: /home/admin/personalblog/public/wp-config.php
    owner: admin
    group: admin
    mode: '0644'

# Security and Permissions
- name: Set Permissions
  file:
    path: /home/admin/personalblog
    owner: admin
    group: admin
    recurse: yes
